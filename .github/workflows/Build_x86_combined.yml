name: Build_x86_combined
on:
  repository_dispatch:
  workflow_dispatch:
  # 定时触发编译
  schedule:
    - cron: 30 18 * * 4

env:
  COMMON_ENV_VARS: &common_env_vars
    DEBIAN_FRONTEND: noninteractive
    TIMEZONE: "Asia/Shanghai"
  
  COMMON_RUN_STEPS: &common_run_steps
    - name: Checkout
      uses: actions/checkout@main
    
    - name: Free disk space
      uses: xiangfeidexiaohuo/actions@free-disk
      with:
        build-mount-path: /home/runner/work/AE86Wrt/AE86Wrt
    
    - name: Initialization environment
      env: *common_env_vars
      run: |
        sudo timedatectl set-timezone "$TIMEZONE"
        sudo -E apt-get update -y
        sudo -E apt-get install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools libpython3-dev qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev libfuse-dev python3-setuptools g++ file clang nano genisoimage
        pip install aligo
        sudo -E apt-get clean
        git config --global user.name 'GitHub Actions' && git config --global user.email 'noreply@github.com'
        df -h
    
    - name: Clone source code
      run: |
        git clone https://github.com/xiangfeidexiaohuo/AE86Wrt.git && mv ./AE86Wrt/* ./ && rm -rf ./AE86Wrt
        git clone --depth 1 ${{ matrix.repo_url }} -b ${{ matrix.repo_branch }} openwrt
        cd openwrt
        cp -f ../diy/lean/lean1.sh ./
        chmod +x ./lean1.sh && ./lean1.sh
    
    - name: Update & Install feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        cp -f ../diy/lean/lean2.sh ./        
        chmod +x ./lean2.sh && ./lean2.sh
        sed -i "s/KERNEL_PATCHVER:=*.*/KERNEL_PATCHVER:=${{ matrix.kernel_version }}/g" target/linux/x86/Makefile
        sed -i "s/KERNEL_TESTING_PATCHVER:=*.*/KERNEL_TESTING_PATCHVER:=${{ matrix.kernel_version }}/g" target/linux/x86/Makefile
        sed -i "s/DISTRIB_DESCRIPTION='*.*'/DISTRIB_DESCRIPTION='AE86Wrt-X86-Lite-$(date +%Y%m%d)'/g" package/lean/default-settings/files/zzz-default-settings
    
    - name: Configuration Customization
      run: |
        [ -e ${{ matrix.config_file }} ] && mv ${{ matrix.config_file }} openwrt/.config
        cd openwrt && make defconfig
    
    - name: Download package
      working-directory: ./openwrt
      run: |
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
    
    - name: Build firmware
      working-directory: ./openwrt
      run: |
        make -j$(nproc) V=s
    
    - name: Assemble Artifact
      id: assemble_artifact
      run: |
        rm -rf ./${{ matrix.output_dir }}
        mkdir -p ./${{ matrix.output_dir }}
        cp -a ./openwrt/.config ./${{ matrix.output_dir }}/${{ matrix.config_name }}
        
        getmd5() {
          md5sum=`md5sum $1`
          md5=`echo ${md5sum% *}`
          md5=`echo ${md5:0:10}`
        }
        
        rom=openwrt/bin/targets/x86/64/openwrt-x86-64-generic-squashfs-combined-efi.img.gz
        getmd5 $rom
        cp -a $rom ./${{ matrix.output_dir }}/AE86Wrt-X86-${{ matrix.kernel_version }}-$(date +%Y%m%d)_${md5}.img.gz
    
    - name: Upload Firmwares
      uses: actions/upload-artifact@main
      with:
        name: AE86Wrt-X86-${{ matrix.kernel_version }}
        path: ${{ matrix.output_dir }}/*.img.gz
    
    - name: Upload config
      uses: actions/upload-artifact@main
      with:
        name: AE86Wrt-X86-${{ matrix.kernel_version }}-config
        path: ${{ matrix.output_dir }}/${{ matrix.config_name }}
    
    - name: Upload Packages
      uses: actions/upload-artifact@main
      with:
        name: AE86Wrt-X86-${{ matrix.kernel_version }}-Packages
        path: openwrt/bin/packages

jobs:
  build:
    strategy:
      matrix:
        include:
          - kernel_version: "5.4"
            repo_url: "https://github.com/xiangfeidexiaohuo/lede"
            repo_branch: "k3"
            config_file: "./configs/X86/x86_504.config"
            config_name: "x86_504.config"
            output_dir: "X86_Out_504"
          
          - kernel_version: "6.12"
            repo_url: "https://github.com/coolsnowwolf/lede"
            repo_branch: "master"
            config_file: "./configs/X86/x86_612.config"
            config_name: "x86_612.config"
            output_dir: "X86_Out_612"

          - kernel_version: "R24.10"
            repo_url: "https://github.com/openwrt/openwrt"
            repo_branch: "openwrt-24.10"
            config_file: "./configs/X86/x86_r2410.config"
            config_name: "x86_r2410.config"
            output_dir: "X86_Out_R24.10"
    
    name: Build_x86_${{ matrix.kernel_version }}
    runs-on: ubuntu-latest
    steps: *common_run_steps

  create_release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate Tag & Release Name
        id: generate_name
        run: |
          time=$(date +%Y%m%d%H%M%S)
          release_tag="$time"
          release_name="AE86Wrt-软路由(X86_64)-$(date +%Y%m%d)"
          echo "release_name=$release_name" >> $GITHUB_OUTPUT
          echo "release_tag=$release_tag" >> $GITHUB_OUTPUT
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release & Upload
        uses: ncipollo/release-action@v1.14.0
        with:
          artifacts: |
            artifacts/AE86Wrt-X86-5.4/*.img.gz
            artifacts/AE86Wrt-X86-6.12/*.img.gz
            artifacts/AE86Wrt-X86-R24.10/*.img.gz
          name: ${{ steps.generate_name.outputs.release_name }}
          tag: ${{ steps.generate_name.outputs.release_tag }}
          token: ${{ secrets.GITHUB_TOKEN }}
